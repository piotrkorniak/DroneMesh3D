name: CI

on:
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  format-check:
    name: Code Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore NuGet packages
        run: dotnet restore DroneMesh3D.slnx

      - name: Check formatting
        run: dotnet format DroneMesh3D.slnx --verify-no-changes

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: format-check
    services:
      postgres:
        image: postgis/postgis:17-3.5
        env:
          POSTGRES_DB: dronemesh3d_test
          POSTGRES_PASSWORD: YourStr0ngP@ssword
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build solution
        run: dotnet build DroneMesh3D.slnx --configuration Release

      - name: Run tests
        run: dotnet test DroneMesh3D.slnx --configuration Release --no-build --logger trx
        env:
          ConnectionStrings__Default: "Host=localhost;Database=dronemesh3d_test;Username=postgres;Password=YourStr0ngP@ssword"

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t dronemesh3d-api:${{ github.sha }} -f Api/Dockerfile .
