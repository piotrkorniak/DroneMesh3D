<div class="area-toolbar">
  <div class="area-toolbar__actions">
    @switch (drawingService.toolbarState()) {
      @case ('idle') {
        <button
          class="area-toolbar__btn area-toolbar__btn--draw"
          [attr.aria-pressed]="false"
          aria-label="Nowy obszar"
          (click)="onStartDrawing()">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
            <path d="M3 15L15 3M15 3H9M15 3V9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span class="area-toolbar__label">Nowy obszar</span>
        </button>
      }
      @case ('drawing') {
        <button
          class="area-toolbar__btn area-toolbar__btn--draw area-toolbar__btn--active"
          aria-pressed="true"
          aria-label="Nowy obszar"
          [disabled]="true">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
            <path d="M3 15L15 3M15 3H9M15 3V9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span class="area-toolbar__label">Nowy obszar</span>
        </button>
        <button
          class="area-toolbar__btn area-toolbar__btn--cancel"
          aria-label="Anuluj"
          (click)="onCancelDrawing()">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
            <path d="M5 5l8 8M13 5l-8 8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          <span class="area-toolbar__label">Anuluj</span>
        </button>
      }
      @case ('polygon-ready') {
        <button
          class="area-toolbar__btn area-toolbar__btn--submit"
          [disabled]="!drawingService.isValid()"
          aria-label="Zapisz"
          (click)="onSubmitArea()">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
            <path d="M4 9l4 4 6-8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span class="area-toolbar__label">Zapisz</span>
        </button>
        <button
          class="area-toolbar__btn area-toolbar__btn--clear"
          aria-label="Wyczyść"
          (click)="onClearPolygon()">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
            <path d="M5 5l8 8M13 5l-8 8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          <span class="area-toolbar__label">Wyczyść</span>
        </button>
      }
      @case ('submitting') {
        <button
          class="area-toolbar__btn area-toolbar__btn--submit"
          [disabled]="true"
          aria-label="Zapisz">
          <span class="area-toolbar__spinner" aria-hidden="true"></span>
          <span class="area-toolbar__label">Zapisuję...</span>
        </button>
        <button
          class="area-toolbar__btn area-toolbar__btn--clear"
          [disabled]="true"
          aria-label="Wyczyść">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
            <path d="M5 5l8 8M13 5l-8 8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          <span class="area-toolbar__label">Wyczyść</span>
        </button>
      }
    }
  </div>

  @if (drawingService.validationErrors().length > 0) {
    <ul class="area-toolbar__errors" role="alert" aria-live="polite">
      @for (error of drawingService.validationErrors(); track error) {
        <li class="area-toolbar__error">{{ error }}</li>
      }
    </ul>
  }
</div>
